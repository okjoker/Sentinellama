<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sentinellama — Hybrid IDS</title>
<style>
  :root {
    --bg: #0b0f17;
    --panel: #131a26;
    --panel-2: #1b2434;
    --border: #243049;
    --text: #e6edf6;
    --muted: #8a98ac;
    --accent: #4da3ff;
    --green: #3fb950;
    --yellow: #d9a441;
    --orange: #e8833a;
    --red: #f85149;
    --gray: #6e7b90;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  header {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 14px 22px; background: var(--panel); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
  .logo span { color: var(--accent); }
  .meta { color: var(--muted); font-size: 12px; }
  .spacer { flex: 1; }
  .pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600;
    background: var(--panel-2); border: 1px solid var(--border);
    cursor: pointer; user-select: none; transition: .15s;
  }
  .pill:hover { border-color: var(--accent); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--gray); }
  .pill.on .dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .pill.off .dot { background: var(--gray); }
  .pill.err .dot { background: var(--red); box-shadow: 0 0 8px var(--red); }
  button {
    font: inherit; font-weight: 600; cursor: pointer; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border);
    padding: 7px 14px; border-radius: 8px; transition: .15s;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #04101f; }
  button.danger { background: var(--red); border-color: var(--red); color: #1a0303; }
  main {
    display: grid; grid-template-columns: 1fr 360px; gap: 18px;
    padding: 18px 22px; max-width: 1400px; margin: 0 auto;
  }
  @media (max-width: 960px) { main { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .panel h2 {
    margin: 0 0 12px; font-size: 13px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); font-weight: 700;
  }
  .side { display: flex; flex-direction: column; gap: 18px; }
  textarea, input {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px;
    font: inherit; resize: vertical;
  }
  textarea:focus, input:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 8px; margin-top: 10px; }
  .alert {
    border: 1px solid var(--border); border-left: 4px solid var(--gray);
    border-radius: 8px; padding: 11px 13px; margin-bottom: 10px; background: var(--panel-2);
  }
  .alert.CRITICAL { border-left-color: var(--red); }
  .alert.HIGH { border-left-color: var(--orange); }
  .alert.MEDIUM { border-left-color: var(--yellow); }
  .alert.LOW { border-left-color: var(--yellow); }
  .alert.CLEAN { border-left-color: var(--green); }
  .alert.ERROR { border-left-color: var(--red); }
  .alert-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; font-weight: 700; letter-spacing: .5px;
    padding: 2px 9px; border-radius: 999px; background: var(--gray); color: #04101f;
  }
  .badge.CRITICAL { background: var(--red); }
  .badge.HIGH { background: var(--orange); }
  .badge.MEDIUM { background: var(--yellow); }
  .badge.LOW { background: var(--yellow); }
  .badge.CLEAN { background: var(--green); }
  .badge.ERROR { background: var(--red); }
  .badge.src {
    background: transparent; border: 1px solid var(--accent);
    color: var(--accent);
  }
  .eid { font-weight: 700; color: var(--accent); }
  .time { color: var(--muted); font-size: 12px; margin-left: auto; }
  .log {
    font-family: ui-monospace, "Cascadia Code", Consolas, monospace; font-size: 12px;
    color: var(--muted); margin: 8px 0; word-break: break-word;
    background: var(--bg); padding: 6px 8px; border-radius: 6px;
  }
  .verdict { white-space: pre-wrap; margin-top: 6px; font-size: 13px; }
  .ctx { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }
  details summary { cursor: pointer; color: var(--accent); font-size: 12px; }
  .empty { color: var(--muted); text-align: center; padding: 30px 0; }
  .kb-item {
    border: 1px solid var(--border); border-radius: 8px; padding: 10px;
    margin-bottom: 8px; background: var(--panel-2); font-size: 13px;
  }
  .score { float: right; color: var(--accent); font-weight: 700; font-size: 12px; }
  .toast {
    position: fixed; bottom: 18px; right: 18px; background: var(--panel-2);
    border: 1px solid var(--border); border-left: 4px solid var(--accent);
    border-radius: 8px; padding: 10px 14px; opacity: 0; transform: translateY(10px);
    transition: .25s; pointer-events: none; max-width: 320px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .small { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <div class="logo">🛡 Sentinel<span>llama</span></div>
  <div class="meta" id="config">—</div>
  <div class="spacer"></div>
  <div id="logPills" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"></div>
  <button class="primary" id="startBtn">▶ Start all</button>
  <button class="danger" id="stopBtn" disabled>■ Stop all</button>
</header>

<main>
  <section class="panel">
    <h2>Live Alert Feed</h2>
    <div id="feed"><div class="empty">No alerts yet. Start monitoring or run a manual analysis.</div></div>
  </section>

  <div class="side">
    <section class="panel">
      <h2>Manual Log Analysis</h2>
      <textarea id="logInput" rows="4" placeholder="Paste a Windows Security log line, e.g.&#10;An account failed to log on | user=admin | source=10.0.0.5"></textarea>
      <div class="row">
        <button class="primary" id="analyzeBtn" style="flex:1">Analyze</button>
      </div>
      <div id="manualResult" style="margin-top:12px"></div>
    </section>

    <section class="panel">
      <h2>Knowledge Base Search</h2>
      <input id="kbInput" placeholder="Search MITRE ATT&CK, e.g. credential dumping" />
      <div class="row">
        <button class="primary" id="searchBtn" style="flex:1">Search</button>
      </div>
      <div id="kbResults" style="margin-top:12px"></div>
    </section>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => (s ?? "").toString().replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function toast(msg) {
  const t = $("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("show"), 3500);
}

function alertCard(a) {
  const risk = (a.risk || "UNKNOWN").toUpperCase();
  const eidText = a.id ? `Event ${esc(a.id)}` : "Manual";
  const eid = `<span class="eid">${eidText}${a.etype ? " · " + esc(a.etype) : ""}</span>`;
  const src = a.source ? `<span class="badge src">${esc(a.source)}</span>` : "";
  const ctx = a.context ? `<div class="ctx">📚 ${esc(a.context)}</div>` : "";
  return `<div class="alert ${risk}">
      <div class="alert-head">
        <span class="badge ${risk}">${esc(risk)}</span>
        ${src}
        ${eid}
        <span class="time">${esc(a.time || "")}</span>
      </div>
      ${a.log ? `<div class="log">${esc(a.log)}</div>` : ""}
      <details ${risk === "CRITICAL" ? "open" : ""}>
        <summary>AI verdict</summary>
        <div class="verdict">${esc(a.analysis)}</div>
        ${ctx}
      </details>
    </div>`;
}

function prependAlert(a) {
  const feed = $("feed");
  const empty = feed.querySelector(".empty");
  if (empty) empty.remove();
  feed.insertAdjacentHTML("afterbegin", alertCard(a));
}

let lastErrToast = "";
async function refreshStatus() {
  try {
    const s = await (await fetch("/api/status")).json();
    const logs = s.logs || {};
    const names = Object.keys(logs);

    $("logPills").innerHTML = names.length
      ? names.map(name => {
          const st = logs[name];
          const cls = st.error ? "err" : (st.running ? "on" : "off");
          const tip = st.error ? st.error : (st.running ? "Monitoring — click to stop" : "Stopped — click to start");
          return `<div class="pill ${cls}" title="${esc(tip)}" data-log="${esc(name)}" data-running="${st.running}">
                    <span class="dot"></span>${esc(name)}</div>`;
        }).join("")
      : `<div class="pill off" style="cursor:default"><span class="dot"></span>unavailable</div>`;

    const states = Object.values(logs);
    const anyOn = states.some(x => x.running);
    const allOn = states.length > 0 && states.every(x => x.running);
    $("startBtn").disabled = allOn || !s.monitor_available;
    $("stopBtn").disabled = !anyOn;

    let cfg = `model: ${s.model} · index: ${s.index}`;
    if (!s.monitor_available) cfg += ` · ⚠ monitor unavailable`;
    const errs = names.filter(n => logs[n].error).map(n => `${n}: ${logs[n].error}`);
    if (errs.length) cfg += ` · ⚠ ${errs.join(" · ")}`;
    $("config").textContent = cfg;

    const errKey = errs.join("|");
    if (errKey && errKey !== lastErrToast) toast("Monitor error — " + errs[0]);
    lastErrToast = errKey;
  } catch (e) { /* server not ready */ }
}

async function setLog(name, action) {
  await fetch(`/api/${action}`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ log: name })
  });
  setTimeout(refreshStatus, 400);
}

$("logPills").addEventListener("click", (e) => {
  const pill = e.target.closest(".pill[data-log]");
  if (!pill) return;
  setLog(pill.dataset.log, pill.dataset.running === "true" ? "stop" : "start");
});

async function loadHistory() {
  try {
    const { alerts } = await (await fetch("/api/alerts?limit=100")).json();
    if (alerts.length) {
      $("feed").innerHTML = alerts.map(alertCard).reverse().join("");
    }
  } catch (e) {}
}

$("startBtn").onclick = async () => {
  $("startBtn").disabled = true;
  const r = await (await fetch("/api/start", { method: "POST" })).json();
  if (!r.ok) toast(r.error || "Failed to start");
  setTimeout(refreshStatus, 400);
};
$("stopBtn").onclick = async () => {
  $("stopBtn").disabled = true;
  await fetch("/api/stop", { method: "POST" });
  setTimeout(refreshStatus, 400);
};

$("analyzeBtn").onclick = async () => {
  const log = $("logInput").value.trim();
  if (!log) return toast("Enter a log line first.");
  const btn = $("analyzeBtn"); btn.disabled = true; btn.textContent = "Analyzing…";
  $("manualResult").innerHTML = `<div class="small">Running RAG + Ollama…</div>`;
  try {
    const r = await (await fetch("/api/analyze", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ log })
    })).json();
    if (r.ok) $("manualResult").innerHTML = alertCard(r.alert);
    else $("manualResult").innerHTML = `<div class="small">⚠ ${esc(r.error)}</div>`;
  } catch (e) {
    $("manualResult").innerHTML = `<div class="small">⚠ ${esc(e.message)}</div>`;
  } finally { btn.disabled = false; btn.textContent = "Analyze"; }
};

$("searchBtn").onclick = async () => {
  const q = $("kbInput").value.trim();
  if (!q) return toast("Enter a search term.");
  const btn = $("searchBtn"); btn.disabled = true; btn.textContent = "Searching…";
  $("kbResults").innerHTML = `<div class="small">Searching knowledge base…</div>`;
  try {
    const r = await (await fetch(`/api/search?q=${encodeURIComponent(q)}&top_k=5`)).json();
    if (r.ok) {
      $("kbResults").innerHTML = r.results.length
        ? r.results.map(x => `<div class="kb-item"><span class="score">${x.score}</span>${esc(x.text)}</div>`).join("")
        : `<div class="small">No matches.</div>`;
    } else $("kbResults").innerHTML = `<div class="small">⚠ ${esc(r.error)}</div>`;
  } catch (e) {
    $("kbResults").innerHTML = `<div class="small">⚠ ${esc(e.message)}</div>`;
  } finally { btn.disabled = false; btn.textContent = "Search"; }
};
$("kbInput").addEventListener("keydown", e => { if (e.key === "Enter") $("searchBtn").click(); });

// --- Live alert websocket with auto-reconnect ---
function connectWS() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "alert") {
      prependAlert(msg.data);
      if ((msg.data.risk || "").toUpperCase() === "CRITICAL")
        toast(`🚨 CRITICAL alert: ${msg.data.source || ""} Event ${msg.data.id || "manual"}`);
    }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}

// --- init ---
refreshStatus();
loadHistory();
connectWS();
setInterval(refreshStatus, 5000);
</script>
</body>
</html>
